- hosts: home-server
  become: false

  tasks:
    - name: Create directories
      ansible.builtin.file:
        path: "{{ ansible_facts.env.HOME }}/.config/containers/systemd/home-server/{{ item.path }}"
        state: directory
        mode: '{{ item.mode }}'
      with_community.general.filetree: quadlets/home-server
      when: item.state == 'directory'

    - name: Deploy Quadlets
      ansible.builtin.template:
        src: '{{ item.src }}'
        dest: "{{ ansible_facts.env.HOME }}/.config/containers/systemd/home-server/{{ item.path | regex_replace('\\.j2$', '') }}"
      with_community.general.filetree: quadlets/home-server/
      when:
        - item.state == 'file'
        - not item.path.endswith('~')

    - name: Reload user systemd
      systemd:
        daemon_reload: true
        scope: user

- hosts: vps
  become: false

  tasks:
    - name: Create base quadlet dir
      ansible.builtin.file:
        path: "{{ ansible_facts.env.HOME }}/.config/containers/systemd/vps"
        state: directory

    - name: Deploy Quadlets
      ansible.builtin.template:
        src: '{{ item.src }}'
        dest: "{{ ansible_facts.env.HOME }}/.config/containers/systemd/vps/{{ item.path | regex_replace('\\.j2$', '') }}"
      with_community.general.filetree: quadlets/vps/
      when:
        - item.state == 'file'
        - not item.path.endswith('~')

    - name: Reload user systemd
      systemd:
        daemon_reload: true
        scope: user
